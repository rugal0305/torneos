<!-- 
  DOCUMENTO DE ARQUITECTURA
  ===========================
  
  Esta landing page sigue principios de:
  - Modularidad: Archivos separados por responsabilidad
  - Pragmatismo SOLID: Aplicado sin exceso de ingeniería
  - Accesibilidad: WCAG 2.1 AA compliant
  - Progressive Enhancement: Funciona sin JS
  
  ESTRUCTURA MODULAR:
  
  CSS/
  ├── variables.css       [Variables globales - OKLCH colors, espaciado, tipografía]
  ├── reset.css          [Reset con accesibilidad incluida]
  ├── style.css          [Importa todos los anteriores + utilidades]
  └── components/
      ├── header.css     [Solo encabezado/nav]
      ├── hero.css       [Solo hero con parallax]
      ├── button.css     [Solo botones - reutilizable]
      ├── luminic-cursor.css [Solo cursor - reutilizable]
      └── sections.css   [Solo secciones de contenido]
  
  JS/
  ├── polyfills.js                [Carga primero - IE9+ support]
  ├── modules/
  │   ├── luminic-cursor.js      [Clase LuminicCursor]
  │   ├── parallax.js            [Clase ParallaxEffect]
  │   └── header.js              [Clase Header]
  ├── script.js                  [Inicializa módulos - carga último]
  
  VENTAJAS DE ESTA ARQUITECTURA:
  
  1. Cada componente CSS puede reutilizarse en otros proyectos
  2. Los módulos JS son independientes y testeable
  3. Los polyfills se cargan primero para garantizar compatibilidad
  4. Sin dependencias externas (vanilla JS/CSS)
  5. Fácil de mantener y escalar
  6. Rendimiento optimizado (load crítico mínimo)
  
  NOTAS DE IMPLEMENTACIÓN:
  
  - LuminicCursor: Detecta automáticamente soporte (touch/hover)
  - ParallaxEffect: Usa data-parallax para configuración
  - Header: Gestiona menú responsive automáticamente
  - Todos los módulos son opcionales (fallbacks incluidos)
  
-->
